site_name: CIVL Documentation
repo_url: https://github.com/verified-software-lab/civl
repo_name: verified-software-lab/civl

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - content.code.copy
    - navigation.footer
    - search.suggest
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-1
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/brightness-3
        name: Switch to system preference

docs_dir: docs

nav:
  - Home: index.md
  - Introduction: introduction.md
  - CIVL-C Fundamentals: fundamentals.md
  - Language Manual: language.md
  - Libraries: libraries.md
  - Command Line Interface: cli.md
  - Examples: examples.md
  - A Challenge Exercise for Twente: challenge.md

plugins:
  - search
  - typeset

markdown_extensions:
  - attr_list
  - smarty
  - admonition
  - tables
  - fenced_code
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.blocks.caption

extra_javascript:
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

extra_css:
  - stylesheets/extra.css
  - https://unpkg.com/katex@0/dist/katex.min.css
